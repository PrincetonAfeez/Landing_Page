{% load static %}
<!doctype html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{{ SITE_NAME }} | {{ TAGLINE }}{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}Reputation and hiring infrastructure for hospitality workers and employers.{% endblock %}">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="{{ SITE_NAME }}">
    <meta property="og:title" content="{% block og_title %}{{ SITE_NAME }} | {{ TAGLINE }}{% endblock %}">
    <meta property="og:description" content="{% block og_description %}Reputation and hiring infrastructure for hospitality workers and employers.{% endblock %}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}{{ SITE_NAME }} | {{ TAGLINE }}{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}Reputation and hiring infrastructure for hospitality workers and employers.{% endblock %}">
    {% if canonical_url %}
    <link rel="canonical" href="{% block canonical_href %}{{ canonical_url }}{% endblock %}">
    <meta property="og:url" content="{% block og_url %}{{ canonical_url }}{% endblock %}">
    {% endif %}
    {% if og_image_url %}
    <meta property="og:image" content="{% block og_image %}{{ og_image_url }}{% endblock %}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:image" content="{% block twitter_image %}{{ og_image_url }}{% endblock %}">
    {% endif %}
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231f4f46'/%3E%3Cpath d='M16 44 32 14l16 30h-8l-3-6H27l-3 6h-8Zm15-14h2l-1-3-1 3Z' fill='%23f6d36d'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'pages/css/site.css' %}">
    <script defer src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js"></script>
    <script defer src="{% static 'pages/js/lucide-init.js' %}"></script>
    {% block head_extra %}{% endblock %}
</head>
<body class="min-h-screen antialiased">
    {% block content %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
