{% if variant == "secondary" %}
    <a href="{{ href }}" class="inline-flex min-h-11 items-center justify-center gap-2 rounded-lg border border-brand-primary/25 bg-white px-5 py-3 text-sm font-semibold text-brand-primary shadow-sm transition hover:border-brand-primary hover:bg-brand-mist focus:outline-none focus:ring-2 focus:ring-brand-primary focus:ring-offset-2">
        {{ label }}
        <i data-lucide="arrow-up-right" class="h-4 w-4"></i>
    </a>
{% else %}
    <a href="{{ href }}" class="inline-flex min-h-11 items-center justify-center gap-2 rounded-lg bg-brand-primary px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-brand-primaryDark focus:outline-none focus:ring-2 focus:ring-brand-primary focus:ring-offset-2">
        {{ label }}
        <i data-lucide="arrow-right" class="h-4 w-4"></i>
    </a>
{% endif %}
