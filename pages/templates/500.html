{% extends "base.html" %}

{% block title %}Server error | {{ SITE_NAME }}{% endblock %}

{% block content %}
    <main class="min-h-screen bg-brand-paper px-5 py-24">
        <section class="mx-auto max-w-2xl rounded-lg border border-brand-primary/15 bg-white p-8 text-center shadow-soft">
            <p class="text-sm font-semibold uppercase text-brand-primary">500</p>
            <h1 class="mt-3 text-4xl font-bold text-brand-ink">Something went sideways.</h1>
            <p class="mt-4 text-base leading-7 text-brand-muted">
                The site could not load this page. Please head back home and try again.
            </p>
            <a href="/" class="mt-8 inline-flex min-h-11 items-center justify-center gap-2 rounded-lg bg-brand-primary px-5 py-3 text-sm font-semibold text-white shadow-sm hover:bg-brand-primaryDark">
                Back home
                <i data-lucide="arrow-right" class="h-4 w-4"></i>
            </a>
        </section>
    </main>
{% endblock %}
