<article class="h-full rounded-lg border border-brand-primary/12 bg-white p-6 shadow-sm transition hover:-translate-y-0.5 hover:border-brand-primary/30 hover:shadow-soft">
    <div class="flex h-11 w-11 items-center justify-center rounded-lg bg-brand-mist text-brand-primary">
        <i data-lucide="{{ feature.icon }}" class="h-5 w-5"></i>
    </div>
    <h3 class="mt-5 text-lg font-semibold text-brand-ink">{{ feature.title }}</h3>
    <p class="mt-3 text-sm leading-6 text-brand-muted">{{ feature.description }}</p>
</article>
